<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Tienda 1 - Kira Kira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #b8d8d8;
            overflow-x: hidden;
        }

        .background {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 30px;
        }

        .wave {
            position: absolute;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 43% 57% 41% 59% / 56% 45% 55% 44%;
            z-index: 0;
        }

        .top-left {
            width: 400px;
            height: 400px;
            top: -150px;
            left: -100px;
            transform: rotate(10deg);
        }

        .bottom-right {
            width: 350px;
            height: 350px;
            bottom: -100px;
            right: -80px;
            transform: rotate(-15deg);
        }

        .sparkle {
            position: absolute;
            color: white;
            z-index: 0;
            opacity: 0.7;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.8));
        }

        .s1 { top: 12%; left: 8%; font-size: 50px; }
        .s2 { bottom: 16%; right: 10%; font-size: 30px; }
        .s3 { top: 38%; right: 5%; font-size: 22px; }

        .container {
            width: 100%;
            max-width: 900px;
            background: #7cc0be;
            padding: 45px 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.10);
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 38px;
            color: #2f4f4f;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .subtext {
            color: #2f4f4f;
            font-weight: 600;
            margin-bottom: 28px;
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin-top: 20px;
        }

        .card {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 95px;
            background: #a7d4d3;
            border-radius: 22px;
            text-decoration: none;
            color: #2f4f4f;
            font-weight: 800;
            font-size: 16px;
            transition: 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.25);
        }

        .card:hover {
            background: #5a9c9a;
            color: white;
            transform: translateY(-3px);
        }

        .back-btn {
            display: inline-block;
            margin-top: 28px;
            padding: 14px 26px;
            background: #2f4f4f;
            color: white;
            border-radius: 28px;
            text-decoration: none;
            font-weight: 800;
            transition: 0.3s ease;
        }

        .back-btn:hover {
            background: #1e3636;
            transform: scale(1.03);
        }

        @media (max-width: 700px) {
            .menu {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 35px 24px;
            }

            h1 {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="wave top-left"></div>
        <div class="wave bottom-right"></div>
        <div class="sparkle s1">✦</div>
        <div class="sparkle s2">✦</div>
        <div class="sparkle s3">✦</div>

        <div class="container">
            <h1>Panel Tienda 1</h1>
            <p class="subtext">Usuario: {{ session["usuario"] }}</p>

            <div class="menu">
                <a href="/tienda1/caja" class="card">Caja</a>
                <a href="/tienda1/ventas-dia" class="card">Ventas del Día</a>
                <a href="/tienda1/gastos" class="card">Gastos de Caja</a>
                <a href="/tienda1/cierre" class="card">Cierre de Caja</a>
                <a href="{{ url_for('consultar_productos') }}" class="card">Consultar Productos</a>
            </div>

            {% if session["rol"] == "Administrador" %}
                <a href="{{ url_for('admin_dashboard') }}" class="back-btn">Volver al Panel Admin</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
