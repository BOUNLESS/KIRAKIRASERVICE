<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Kira Kira</title>

    <style>
        /* General */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            height: 100vh;
            background-color: #b8d8d8;
            overflow: hidden;
        }

        .background {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Decorative shapes */
        .wave {
            position: absolute;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 43% 57% 41% 59% / 56% 45% 55% 44%;
            z-index: 0;
        }

        .top-left {
            width: 400px;
            height: 400px;
            top: -150px;
            left: -100px;
            transform: rotate(10deg);
        }

        .bottom-right {
            width: 350px;
            height: 350px;
            bottom: -100px;
            right: -80px;
            transform: rotate(-15deg);
        }

        .sparkle {
            position: absolute;
            color: white;
            z-index: 0;
            opacity: 0.7;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.8));
        }

        .s1 { top: 15%; left: 8%; font-size: 50px; }
        .s2 { bottom: 20%; right: 10%; font-size: 30px; }
        .s3 { top: 40%; right: 5%; font-size: 20px; }

        /* Login card */
        .login-card {
            background: #7cc0be;
            width: 400px;
            padding: 50px 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 10;
        }

        .title {
            font-size: 42px;
            color: #2f4f4f;
            font-weight: 800;
            line-height: 0.9;
            margin-bottom: 5px;
        }

        .sub {
            display: block;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 3px;
            margin-top: 5px;
        }

        .welcome {
            margin: 20px 0 30px;
            color: #2f4f4f;
            font-weight: 600;
            font-size: 15px;
        }

        /* Inputs */
        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 20px;
            border: none;
            background: #a7d4d3;
            outline: none;
            color: #2f4f4f;
            font-weight: 600;
        }

        input::placeholder {
            color: #2f4f4f;
            opacity: 0.7;
            font-weight: 700;
            font-size: 12px;
        }

        /* Button */
        .login-btn {
            margin-top: 25px;
            width: 65%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: #2f4f4f;
            color: white;
            font-weight: 800;
            font-size: 16px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .login-btn:hover {
            background: #1e3636;
            transform: scale(1.03);
        }
    </style>
</head>

<body>

<div class="background">

    <!-- Decoración -->
    <div class="wave top-left"></div>
    <div class="wave bottom-right"></div>

    <div class="sparkle s1">✦</div>
    <div class="sparkle s2">✦</div>
    <div class="sparkle s3">✦</div>

    <!-- Login -->
    <div class="login-card">

        <h1 class="title">
            KIRA KIRA
            <span class="sub">SERVICE</span>
        </h1>

        <p class="welcome">Inicia sesión para continuar</p>

        <form action="/login" method="POST">

            <div class="input-group">
                <input type="text" name="usuario" placeholder="USUARIO" required>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="CONTRASEÑA" required>
            </div>

            <button type="submit" class="login-btn">ENTRAR</button>

        </form>

    </div>

</div>

</body>
</html>
